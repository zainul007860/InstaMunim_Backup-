<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaMunim - Offline</title>
  <style>
    :root {
      --bg: #09090b;
      --card-bg: #18181b;
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --primary: #f97316;
      --primary-hover: #ea580c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 320px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Beautiful Pulsing WiFi Off Icon */
    .icon-wrapper {
      position: relative;
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.15), rgba(234, 88, 12, 0.05));
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(249, 115, 22, 0.1);
    }

    .icon-wrapper::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 32px;
      border: 1px dashed rgba(249, 115, 22, 0.2);
      animation: spin 20s linear infinite;
    }

    .wifi-icon {
      width: 40px;
      height: 40px;
      fill: none;
      stroke: var(--primary);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .title {
      font-size: 22px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #ffffff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      font-weight: 500;
      margin-top: 8px;
    }

    /* Premium Styled Button */
    .btn-retry {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), #ea580c);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(249, 115, 22, 0.25);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-retry:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(249, 115, 22, 0.15);
    }

    .btn-retry.loading {
      opacity: 0.8;
      pointer-events: none;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon-wrapper">
      <!-- Wifi Off Custom Icon -->
      <svg class="wifi-icon" viewBox="0 0 24 24">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.83-2.84M8.5 16.5a4.48 4.48 0 0 1 1.67-1.3M12 20h.01" />
        <path d="M12 20a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z" fill="var(--primary)" />
      </svg>
    </div>

    <div>
      <h1 class="title">No Connection</h1>
      <p class="subtitle">
        InstaMunim ko chalane ke liye internet connection chahiye. Kripya apna network check karein aur dobara koshish karein.
      </p>
    </div>

    <button id="retry-btn" class="btn-retry" onclick="tryReconnect()">
      <span class="spinner" id="btn-spinner"></span>
      <span id="btn-text">Dobara Koshish Karein</span>
    </button>
  </div>

  <script>
    function tryReconnect() {
      const btn = document.getElementById('retry-btn');
      const spinner = document.getElementById('btn-spinner');
      const text = document.getElementById('btn-text');

      btn.classList.add('loading');
      spinner.style.display = 'inline-block';
      text.innerText = 'Connecting...';

      // Check if navigator.onLine is true, or just try to load the vercel URL
      setTimeout(() => {
        window.location.href = "https://instamunimapp.vercel.app";
      }, 800);
    }
  </script>
</body>
</html>
